name: release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Extract version
        id: version
        run: echo "value=$(grep '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"
      - name: Check version increased
        id: check
        run: |
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -1)
          current="v${{ steps.version.outputs.value }}"
          if [ -z "$latest_tag" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$current" = "$latest_tag" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Run tests
        if: steps.check.outputs.skip == 'false'
        run: cargo test --all-features

  build:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            cross_pkg: gcc-i686-linux-gnu
            linker: i686-linux-gnu-gcc
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross_pkg: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install cross-compilation packages
        if: matrix.cross_pkg
        shell: bash
        run: apt-get update && apt-get install -y ${{ matrix.cross_pkg }}
      - name: Set cross-linker
        if: matrix.linker
        shell: bash
        run: |
          target_upper=$(echo ${{ matrix.target }} | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${target_upper}_LINKER=${{ matrix.linker }}" >> $GITHUB_ENV
      - name: Add target
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - name: Build release
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare binary
        shell: bash
        run: |
          ext=""
          [[ "${{ matrix.target }}" == *-windows-* ]] && ext=".exe"
          cp "target/${{ matrix.target }}/release/starling${ext}" "starling-${{ matrix.target }}${ext}"
      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: starling-${{ matrix.target }}
          path: starling-${{ matrix.target }}*

  release:
    needs: [detect, build]
    if: needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Install tools
        run: |
          apt-get update && apt-get install -y jq

      - name: Download macOS binaries from GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN_GITHUB }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ACTION_TOKEN_GITHUB not set, skipping macOS download"
            exit 0
          fi
          TAG="v${{ needs.detect.outputs.version }}"
          mkdir -p artifacts
          assets=$(curl -sf "https://api.github.com/repos/Saltfault/Starling/releases/tags/$TAG" \
            -H "Authorization: Bearer $GH_TOKEN" | jq -r '.assets[]?.browser_download_url // empty')
          if [ -z "$assets" ]; then
            echo "macOS binaries not yet available on GitHub"
            exit 0
          fi
          echo "$assets" | while read url; do
            curl -sL -o "artifacts/$(basename $url)" "$url"
          done

      - name: Create Forgejo Release
        shell: bash
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.detect.outputs.version }}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          API="https://${GITHUB_SERVER_URL#https://}/api/v1"

          release_id=$(curl -sf "$API/repos/$OWNER/$REPO/releases/tags/$TAG" \
            -H "Authorization: Bearer $FORGEJO_TOKEN" | jq -r '.id // empty')

          if [ -z "$release_id" ]; then
            release_id=$(curl -sf -X POST "$API/repos/$OWNER/$REPO/releases" \
              -H "Authorization: Bearer $FORGEJO_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}" | jq -r '.id // empty')
          fi

          if [ -z "$release_id" ]; then
            echo "Could not create or find Forgejo release for $TAG"
            exit 1
          fi

          for f in artifacts/*; do
            [ ! -f "$f" ] && continue
            filename=$(basename "$f")
            echo "Uploading $filename to Forgejo release $release_id"
            curl -sf -X POST "$API/repos/$OWNER/$REPO/releases/$release_id/assets" \
              -H "Authorization: Bearer $FORGEJO_TOKEN" \
              -F "attachment=@$f" > /dev/null 2>&1 || echo "Upload skipped (may already exist): $filename"
          done

          echo "Forgejo release $TAG populated with $(find artifacts -type f | wc -l) assets"

      - name: Upload binaries to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN_GITHUB }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ACTION_TOKEN_GITHUB not set, skipping GitHub upload"
            exit 0
          fi
          TAG="v${{ needs.detect.outputs.version }}"
          release_id=$(curl -sf "https://api.github.com/repos/Saltfault/Starling/releases/tags/$TAG" \
            -H "Authorization: Bearer $GH_TOKEN" | jq -r '.id // empty')
          if [ -z "$release_id" ]; then
            echo "GitHub release $TAG does not exist yet, skipping"
            exit 0
          fi
          for f in artifacts/*; do
            [ ! -f "$f" ] && continue
            filename=$(basename "$f")
            echo "Uploading $filename to GitHub release $release_id"
            curl -sf -X POST "https://uploads.github.com/repos/Saltfault/Starling/releases/$release_id/assets?name=$filename" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f" > /dev/null 2>&1 || echo "Upload skipped (may already exist): $filename"
          done
          echo "GitHub Release supplemented with $(find artifacts -type f | wc -l) assets"
