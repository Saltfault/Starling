name: release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Extract version
        id: version
        run: echo "value=$(grep '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"
      - name: Check version increased
        id: check
        run: |
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -1)
          current="v${{ steps.version.outputs.value }}"
          if [ -z "$latest_tag" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$current" = "$latest_tag" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Run tests
        if: steps.check.outputs.skip == 'false'
        run: cargo test --all-features

  release:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install tools
        run: |
          apt-get update && apt-get install -y jq

      - name: Install cross-compilation packages
        run: |
          apt-get install -y \
            gcc-i686-linux-gnu \
            gcc-aarch64-linux-gnu \
            gcc-mingw-w64-x86-64 \
            gcc-mingw-w64-i686

      - name: Build all targets
        run: |
          set -e
          targets=(
            "x86_64-unknown-linux-gnu"
            "i686-unknown-linux-gnu:gcc:i686-linux-gnu-gcc"
            "aarch64-unknown-linux-gnu:gcc:aarch64-linux-gnu-gcc"
            "x86_64-pc-windows-gnu:x86_64-w64-mingw32-gcc:x86_64-w64-mingw32-gcc"
            "i686-pc-windows-gnu:i686-w64-mingw32-gcc:i686-w64-mingw32-gcc"
          )
          for entry in "${targets[@]}"; do
            IFS=':' read -r target pkg linker <<< "$entry"
            echo "=== Building $target ==="
            rustup target add "$target"
            if [ -n "$linker" ]; then
              target_upper=$(echo "$target" | tr '[:lower:]-' '[:upper:]_')
              export "CARGO_TARGET_${target_upper}_LINKER=$linker"
            fi
            cargo build --release --target "$target"
            ext=""
            [[ "$target" == *-windows-* ]] && ext=".exe"
            cp "target/$target/release/starling$ext" "starling-$target$ext"
          done
          ls -la starling-*

      - name: Download macOS from Linux + Windows from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN_GITHUB }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ACTION_TOKEN_GITHUB not set, skipping GitHub download"
            exit 0
          fi
          TAG="v${{ needs.detect.outputs.version }}"
          for i in $(seq 1 30); do
            assets=$(curl -s "https://api.github.com/repos/Saltfault/Starling/releases/tags/$TAG" \
              -H "Authorization: Bearer $GH_TOKEN" | jq -r '.assets[]?.browser_download_url // empty')
            if [ -n "$assets" ]; then break; fi
            echo "GitHub release not ready yet, retry $i/30..."
            sleep 30
          done
          if [ -z "$assets" ]; then
            echo "macOS binaries not available on GitHub after retries"
            exit 0
          fi
          echo "$assets" | while read url; do
            curl -sL -o "$(basename $url)" "$url"
          done
          ls -la *.darwin

      - name: Create Forgejo Release
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.detect.outputs.version }}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          API="https://${GITHUB_SERVER_URL#https://}/api/v1"
          mkdir -p artifacts
          mv starling-* artifacts/ 2>/dev/null || true

          # delete existing tag+release so we can recreate cleanly
          curl -s -X DELETE "$API/repos/$OWNER/$REPO/releases/tags/$TAG" \
            -H "Authorization: Bearer $FORGEJO_TOKEN" > /dev/null 2>&1

          release_id=$(curl -s -X POST "$API/repos/$OWNER/$REPO/releases" \
            -H "Authorization: Bearer $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}" | jq -r '.id // empty')

          if [ -z "$release_id" ]; then
            echo "Failed to create Forgejo release"
            exit 1
          fi

          for f in artifacts/*; do
            [ ! -f "$f" ] && continue
            filename=$(basename "$f")
            echo "Uploading $filename"
            curl -s -X POST "$API/repos/$OWNER/$REPO/releases/$release_id/assets" \
              -H "Authorization: Bearer $FORGEJO_TOKEN" \
              -F "attachment=@$f" > /dev/null 2>&1 || echo "Upload failed for $filename"
          done

          echo "Forgejo release $TAG created with $(find artifacts -type f | wc -l) assets"

      - name: Upload all binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN_GITHUB }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ACTION_TOKEN_GITHUB not set, skipping GitHub upload"
            exit 0
          fi
          TAG="v${{ needs.detect.outputs.version }}"
          for i in $(seq 1 30); do
            release_id=$(curl -s "https://api.github.com/repos/Saltfault/Starling/releases/tags/$TAG" \
              -H "Authorization: Bearer $GH_TOKEN" | jq -r '.id // empty')
            if [ -n "$release_id" ]; then break; fi
            echo "GitHub release not ready, retry $i/30..."
            sleep 30
          done
          if [ -z "$release_id" ]; then
            echo "GitHub release $TAG does not exist after retries"
            exit 0
          fi
          existing_assets=$(curl -s "https://api.github.com/repos/Saltfault/Starling/releases/$release_id/assets" \
            -H "Authorization: Bearer $GH_TOKEN" | jq -r '.[].name // empty')
          for f in artifacts/*; do
            [ ! -f "$f" ] && continue
            filename=$(basename "$f")
            if echo "$existing_assets" | grep -qx "$filename"; then
              echo "Skipping $filename (already in release)"
              continue
            fi
            echo "Uploading $filename to GitHub release"
            curl -s -X POST "https://uploads.github.com/repos/Saltfault/Starling/releases/$release_id/assets?name=$filename" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f" > /dev/null 2>&1 || echo "Upload failed for $filename"
          done
          echo "GitHub Release supplemented"
