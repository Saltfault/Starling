name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: echo "value=$(grep '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"
      - name: Check version increased
        id: check
        run: |
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -1)
          current="v${{ steps.version.outputs.value }}"
          if [ -z "$latest_tag" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$current" = "$latest_tag" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Run tests
        if: steps.check.outputs.skip == 'false'
        run: cargo test --all-features

  build:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: i686-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare binary
        shell: bash
        run: |
          ext=""
          [[ "${{ matrix.target }}" == *-windows-* ]] && ext=".exe"
          cp "target/${{ matrix.target }}/release/starling${ext}" "starling-${{ matrix.target }}${ext}"
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: starling-${{ matrix.target }}
          path: starling-${{ matrix.target }}

  release:
    needs: [detect, build]
    if: needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.detect.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true

      - name: Upload macOS binaries to Forgejo Release
        shell: bash
        env:
          FORGEJO_TOKEN: ${{ secrets.ACTION_TOKEN_FORGEJO }}
        run: |
          if [ -z "$FORGEJO_TOKEN" ]; then
            echo "ACTION_TOKEN_FORGEJO not set, skipping Forgejo upload"
            exit 0
          fi
          TAG="v${{ needs.detect.outputs.version }}"
          API="https://forgejo.hearthhome.lol/api/v1"
          OWNER="Saltfault"
          REPO="Starling"

          # find existing release
          release_id=$(curl -sf "$API/repos/$OWNER/$REPO/releases/tags/$TAG" \
            -H "Authorization: Bearer $FORGEJO_TOKEN" | jq -r '.id // empty')

          # create if missing
          if [ -z "$release_id" ]; then
            release_id=$(curl -sf -X POST "$API/repos/$OWNER/$REPO/releases" \
              -H "Authorization: Bearer $FORGEJO_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}" | jq -r '.id // empty')
          fi

          if [ -z "$release_id" ]; then
            echo "Could not create or find Forgejo release for $TAG"
            exit 1
          fi

          # upload macOS assets
          for f in artifacts/*; do
            [ ! -f "$f" ] && continue
            filename=$(basename "$f")
            echo "Uploading $filename to Forgejo release $release_id"
            curl -sf -X POST "$API/repos/$OWNER/$REPO/releases/$release_id/assets" \
              -H "Authorization: Bearer $FORGEJO_TOKEN" \
              -F "attachment=@$f" > /dev/null 2>&1 || echo "Upload skipped (may already exist): $filename"
          done

          echo "macOS binaries uploaded to Forgejo release $TAG"
